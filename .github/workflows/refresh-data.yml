name: Refresh data BPS/OJK (harian)

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tarik data terbaru
        env:
          BPS_API_KEY: ${{ secrets.BPS_API_KEY }}
        run: python pipeline/run.py
      - name: Commit CSV bila berubah
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/data; then
            git add public/data
            git commit -m "chore: refresh data BPS/OJK terjadwal"
            git push
          else
            echo "Tidak ada perubahan data."
          fi

      - name: Periksa kesehatan data
        run: |
          python - <<'PY'
          import json, sys
          d = json.load(open("public/data/data_status.json"))
          bad = {k: v for k, v in (d.get("sources") or {}).items() if v.get("status") != "ok"}
          if bad:
              for k, v in bad.items():
                  print(f"::error::Sumber '{k}' {v.get('status')}: {v.get('reason')}")
              print(f"::error::{len(bad)} sumber data bermasalah. Dashboard memakai data lama (fallback). "
                    f"Perlu diperbaiki sebelum refresh berikutnya.")
              sys.exit(1)
          print("Semua sumber data ok")
          PY
